{% extends 'base.html' %}

{% block title %}Sign In | AntiqueTunes{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
  <div class="bg-white border border-parchment rounded-lg shadow-sm p-8">
    <h1 class="font-display text-3xl text-mahogany mb-2 text-center">Sign In</h1>
    <p class="text-gray-500 text-sm text-center mb-8">Welcome back to AntiqueTunes</p>

    <form method="post" action="{% url 'accounts:login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" novalidate>
      {% csrf_token %}

      <div class="mb-5">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" id="email" name="email" required autocomplete="email"
               value="{{ request.POST.email }}"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
      </div>

      <button type="submit"
              class="w-full bg-mahogany text-cream py-2.5 rounded font-semibold text-sm hover:bg-mahogany-light transition-colors">
        Sign In
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Don't have an account?
      <a href="{% url 'accounts:register' %}" class="text-mahogany font-medium hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
