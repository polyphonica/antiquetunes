{% extends 'base.html' %}

{% block title %}My Profile | AntiqueTunes{% endblock %}

{% block content %}
<main class="bg-cream min-h-screen">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

    <h1 class="font-display text-3xl text-mahogany mb-8">My Profile</h1>

    {# ── Profile details ── #}
    <section class="bg-white border border-parchment rounded-xl p-6 mb-6">
      <h2 class="font-display text-xl text-mahogany mb-5">Account Details</h2>

      <form method="post" novalidate>
        {% csrf_token %}
        <input type="hidden" name="action" value="update_profile">

        <div class="mb-4">
          <label for="display_name" class="block text-sm font-medium text-gray-700 mb-1">Display name</label>
          <input type="text" id="display_name" name="display_name"
                 value="{{ user.display_name }}"
                 class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
        </div>

        <div class="mb-6">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
          <input type="email" id="email" name="email" required
                 value="{{ user.email }}"
                 class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
        </div>

        <button type="submit"
                class="bg-mahogany text-cream px-5 py-2 rounded font-semibold text-sm hover:bg-mahogany-light transition-colors">
          Save Changes
        </button>
      </form>
    </section>

    {# ── Change password ── #}
    <section class="bg-white border border-parchment rounded-xl p-6">
      <h2 class="font-display text-xl text-mahogany mb-5">Change Password</h2>

      <form method="post" novalidate>
        {% csrf_token %}
        <input type="hidden" name="action" value="change_password">

        <div class="mb-4">
          <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">Current password</label>
          <input type="password" id="current_password" name="current_password" required
                 autocomplete="current-password"
                 class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
        </div>

        <div class="mb-4">
          <label for="new_password1" class="block text-sm font-medium text-gray-700 mb-1">New password</label>
          <input type="password" id="new_password1" name="new_password1" required
                 autocomplete="new-password"
                 class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
          <p class="text-xs text-gray-400 mt-1">At least 8 characters.</p>
        </div>

        <div class="mb-6">
          <label for="new_password2" class="block text-sm font-medium text-gray-700 mb-1">Confirm new password</label>
          <input type="password" id="new_password2" name="new_password2" required
                 autocomplete="new-password"
                 class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
        </div>

        <button type="submit"
                class="bg-mahogany text-cream px-5 py-2 rounded font-semibold text-sm hover:bg-mahogany-light transition-colors">
          Change Password
        </button>
      </form>
    </section>

  </div>
</main>
{% endblock %}
