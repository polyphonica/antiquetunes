{% extends 'base.html' %}

{% block title %}Create Account | AntiqueTunes{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
  <div class="bg-white border border-parchment rounded-lg shadow-sm p-8">
    <h1 class="font-display text-3xl text-mahogany mb-2 text-center">Create Account</h1>
    <p class="text-gray-500 text-sm text-center mb-8">Join AntiqueTunes to purchase and download sheet music</p>

    <form method="post" action="{% url 'accounts:register' %}" novalidate>
      {% csrf_token %}

      <div class="mb-5">
        <label for="display_name" class="block text-sm font-medium text-gray-700 mb-1">Display name <span class="text-gray-400 font-normal">(optional)</span></label>
        <input type="text" id="display_name" name="display_name" autocomplete="name"
               value="{{ request.POST.display_name }}"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
      </div>

      <div class="mb-5">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" id="email" name="email" required autocomplete="email"
               value="{{ request.POST.email }}"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
      </div>

      <div class="mb-5">
        <label for="password1" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password1" name="password1" required autocomplete="new-password"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
        <p class="text-xs text-gray-400 mt-1">At least 8 characters</p>
      </div>

      <div class="mb-6">
        <label for="password2" class="block text-sm font-medium text-gray-700 mb-1">Confirm password</label>
        <input type="password" id="password2" name="password2" required autocomplete="new-password"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
      </div>

      <button type="submit"
              class="w-full bg-mahogany text-cream py-2.5 rounded font-semibold text-sm hover:bg-mahogany-light transition-colors">
        Create Account
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Already have an account?
      <a href="{% url 'accounts:login' %}" class="text-mahogany font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
