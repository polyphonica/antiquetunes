{% extends 'base.html' %}

{% block title %}Password Reset Complete | AntiqueTunes{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
  <div class="bg-white border border-parchment rounded-lg shadow-sm p-8 text-center">
    <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1 class="font-display text-2xl text-mahogany mb-3">Password updated</h1>
    <p class="text-gray-500 text-sm mb-8">
      Your password has been changed. You can now sign in with your new password.
    </p>
    <a href="{% url 'accounts:login' %}"
       class="inline-block bg-mahogany text-cream px-6 py-2.5 rounded font-semibold text-sm hover:bg-mahogany-light transition-colors">
      Sign In
    </a>
  </div>
</div>
{% endblock %}
