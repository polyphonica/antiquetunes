{% extends 'base.html' %}

{% block title %}Reset Password | AntiqueTunes{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
  <div class="bg-white border border-parchment rounded-lg shadow-sm p-8">
    <h1 class="font-display text-3xl text-mahogany mb-2 text-center">Reset Password</h1>
    <p class="text-gray-500 text-sm text-center mb-8">
      Enter your email address and we'll send you a link to reset your password.
    </p>

    <form method="post" novalidate>
      {% csrf_token %}

      <div class="mb-6">
        <label for="id_email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
        <input type="email" id="id_email" name="email" required autocomplete="email"
               class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gold focus:border-transparent" />
      </div>

      <button type="submit"
              class="w-full bg-mahogany text-cream py-2.5 rounded font-semibold text-sm hover:bg-mahogany-light transition-colors">
        Send Reset Link
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Remembered it?
      <a href="{% url 'accounts:login' %}" class="text-mahogany font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
