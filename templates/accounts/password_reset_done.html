{% extends 'base.html' %}

{% block title %}Check Your Email | AntiqueTunes{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
  <div class="bg-white border border-parchment rounded-lg shadow-sm p-8 text-center">
    <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <h1 class="font-display text-2xl text-mahogany mb-3">Check your email</h1>
    <p class="text-gray-500 text-sm mb-6">
      If an account exists for that address, we've sent a password reset link. It may take a minute or two to arrive.
    </p>
    <a href="{% url 'accounts:login' %}"
       class="inline-block text-mahogany font-medium text-sm hover:underline">
      Back to sign in
    </a>
  </div>
</div>
{% endblock %}
